[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "frontend",
    "bigquery_export",
]

[tool.ruff.lint]
select = [
    "E9",
    "F63",
    "F7",
    "F82",
    "B",
    "UP",
    "I",
]
ignore = [
    # FastAPI Depends/Query/Body/Header in defaults is intentional
    "B008",
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
explicit_package_bases = true
check_untyped_defs = true
warn_unused_configs = true
