[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "frontend",
    "bigquery_export",
]

[tool.ruff.lint]
select = [
    "E9",
    "F63",
    "F7",
    "F82",
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
follow_imports = "skip"
check_untyped_defs = true
warn_unused_configs = true
