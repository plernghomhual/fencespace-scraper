# ── API sub-modules (FastAPI routers with minimal annotation coverage) ────────
[[tool.mypy.overrides]]
module = [
    "api.v1.fencer_h2h",
    "api.v1.fencer_milestones",
    "api.v1.fencer_ranking_trajectory",
    "api.v1.fencer_stats",
    "api.v1.tournament_brackets",
    "api.v1.tournament_details",
]
disallow_untyped_defs = false

# ── Core library helpers ──────────────────────────────────────────────────────
# These files have partial annotation coverage; suppress the annotation
# requirement while keeping other checks active.
[[tool.mypy.overrides]]
module = [
    "api",
    "run_logger",
    "fed_rankings_common",
    "scraper_state",
    "season_utils",
]
disallow_untyped_defs = false

