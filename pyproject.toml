[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "frontend",
    "bigquery_export",
]

[tool.ruff.lint]
select = [
    "E9",
    "F63",
    "F7",
    "F82",
    "B",
    "UP",
    "I",
]
ignore = [
    # FastAPI Depends/Query/Body/Header in defaults is intentional
    "B008",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "--tb=short",
]

[tool.coverage.run]
source = ["."]
omit = [
    ".venv/*",
    "tests/*",
    "scripts/*",
    "supabase/*",
    "frontend/*",
    "bigquery_export/*",
]

[tool.coverage.report]
fail_under = 30
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
explicit_package_bases = true
check_untyped_defs = true
warn_unused_configs = true
# disallow_untyped_defs is enforced below only on core library modules that
# already carry type annotations. The ~100 scraper/compute/enrich scripts
# and all test files use dynamic web data and are suppressed via overrides.
disallow_untyped_defs = true

# ── Scraper / compute / enrich / aggregate scripts ──────────────────────────
# These are dynamic web-scraping or analytics scripts that work with loosely
# typed JSON/HTML data from third-party sources. Type annotation coverage
# across ~100 files is intentionally deferred; errors are suppressed here.
