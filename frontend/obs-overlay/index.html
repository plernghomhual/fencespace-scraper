<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FenceSpace OBS Overlay</title>
  <link rel="stylesheet" href="styles.css">
  <script src="overlay.js" defer></script>
</head>
<body>
  <main class="overlay-shell" aria-live="polite">
    <section class="score-panel">
      <div class="event-row">
        <div>
          <p id="overlay-status" class="status-pill disconnected">Disconnected</p>
          <h1 id="event-name">FenceSpace Live</h1>
          <p id="event-meta">Waiting for live scoring data</p>
        </div>
        <time id="updated-at">--:--</time>
      </div>

      <div id="score-strip" class="score-strip no-active">
        <span>No active event</span>
      </div>

      <div class="content-grid">
        <section>
          <h2>Leaders</h2>
          <ol id="leaderboard" class="leaderboard">
            <li>No active leaderboard</li>
          </ol>
        </section>

        <section>
          <h2>Bouts</h2>
          <div id="bouts" class="bouts">
            <article class="bout-card disconnected">
              <span>Disconnected from live data</span>
            </article>
          </div>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
