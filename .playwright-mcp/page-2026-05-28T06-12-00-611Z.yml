        - heading "Sport Specific Information" [level=2] [ref=e153]
        - paragraph [ref=e154]: When and where did you begin this sport? She began fencing in 2013.
        - paragraph [ref=e155]: Why this sport? She became interested in fencing while watching the 2008 Olympic Games in Beijing, but her parents thought the sport was too expensive. "A few years later, I found out that my high school had a free fencing club. Under my coach's approval, after a few weeks, I was given the green light to do a trial run at a fencing club because he felt that I had some potential. The summer before sophomore year of high school, I did a week-long summer camp at Fencers Club and won the tournament held at the end of that week."
        - paragraph [ref=e156]: "Club / Team New York Athletic Club [USA] / New York Fencing Academy [USA]:"
        - paragraph [ref=e157]: Name of coach Natalie Dostert [national], GER
        - paragraph [ref=e158]: Handedness Right
      - generic [ref=e159]:
        - heading "General Interest" [level=2] [ref=e160]
        - paragraph [ref=e161]: Hobbies Playing the piano, walking in parks, listening to music, drawing, visiting zoos. (gocolumbialions.com, 05 Mar 2020; barnard.edu, 28 Mar 2019)
        - paragraph [ref=e162]: Superstitions / Rituals / Beliefs She uses visualisation and music before competing to overcome her nerves. (bwog.com, 21 Mar 2018)
        - paragraph [ref=e163]: Awards and honours In 2020 she received the Karen Blank Award, which is presented to the female student-athlete enrolled at Barnard College who exemplifies the qualities of academic success, athletic achievement, strong sporting behaviour and commitment to community. (barnard.edu, 07 Dec 2012; Columbia Athletics X profile, 27 May 2020)
        - paragraph [ref=e164]: Milestones With her triumph in individual epee at the 2019 NCAA Championships in Cleveland, OH, United States of America, she became the first Barnard College student-athlete to win an individual NCAA title in any sport. She represented Columbia University at the event through a consortium between the two universities, and with her title also became the first female fencer representing Columbia University to win an NCAA championship title in individual epee. (gocolumbialions.com, 05 Mar 2020; barnard.edu, 28 Mar 2019)
        - paragraph [ref=e165]: Ambitions To compete at the 2024 Olympic Games in Paris. Outside of sport, she aspires to attend medical school and work as a doctor. (columbiaspectator.com, 22 Mar 2021; nyacparis2024.com, 01 Feb 2024)
        - paragraph [ref=e166]:
          - text: Other information
          - generic [ref=e167]:
            - text: UNIVERSITY SWITCH
            - text: After enrolling at Fordham University in New York, NY, United States of America in 2017, she transferred to Barnard College in New York during her second year of studies in order to compete in collegiate fencing as part of a consortium that allowed her to represent Columbia University. In 2020 she completed a degree in neuroscience and behaviour, and later began studying for a post-baccalaureate degree. (gocolumbialions.com, 05 Mar 2020; bwog.com, 21 Mar 2018; columbiaspectator.com, 22 Mar 2021)
